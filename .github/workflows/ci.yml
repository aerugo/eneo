name: CI

on:
  push:
    branches:
      - develop
      - 'release/**'
  pull_request:
    branches:
      - develop
      - 'release/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  POSTGRES_USER: placeholder
  POSTGRES_HOST: placeholder
  POSTGRES_PASSWORD: placeholder
  POSTGRES_PORT: 5432
  POSTGRES_DB: placeholder
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  UPLOAD_FILE_TO_SESSION_MAX_SIZE: 10485760
  UPLOAD_IMAGE_TO_SESSION_MAX_SIZE: 10485760
  UPLOAD_MAX_FILE_SIZE: 10485760
  TRANSCRIPTION_MAX_FILE_SIZE: 10485760
  MAX_IN_QUESTION: 1
  API_PREFIX: /api/v1
  API_KEY_LENGTH: 64
  API_KEY_HEADER_NAME: X-API-Key
  JWT_AUDIENCE: test
  JWT_ISSUER: test
  JWT_EXPIRY_TIME: 3600
  JWT_ALGORITHM: HS256
  JWT_SECRET: test_secret
  JWT_TOKEN_PREFIX: Bearer
  URL_SIGNING_KEY: test_key
  ENCRYPTION_KEY: yPIAaWTENh5knUuz75NYHblR3672X-7lH-W6AD4F1hs=
  OPENAI_API_KEY: test-api-key

jobs:
  branch-policy:
    if: github.event_name == 'pull_request'
    name: Branch policy
    runs-on: ubuntu-latest

    steps:
      - name: Check branch name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH_NAME" == "develop" || "$BRANCH_NAME" == release/* ]]; then
            echo "Long-lived branch; skipping naming convention check."
            exit 0
          fi

          VALID_PREFIXES="^(dependabot/|feature/|feat/|fix/|hotfix/|security/|chore/|deps/|docs/|test/|refactor/|remove/|ci/)"

          if [[ ! "$BRANCH_NAME" =~ $VALID_PREFIXES ]]; then
            echo "::error::Branch name '$BRANCH_NAME' does not follow the naming convention."
            echo "Use one of: dependabot/, feature/, feat/, fix/, hotfix/, security/, chore/, deps/, docs/, test/, refactor/, remove/, or ci/."
            exit 1
          fi

  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.8.22"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Verify lockfile consistency
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --python 3.11 --frozen --all-groups

      - name: Ruff lint
        run: uv run ruff check src/intric --output-format github

      - name: Ruff format check
        run: uv run ruff format --check src/intric

      - name: Pyright type check
        run: uv run pyright

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.8.22"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Verify lockfile consistency
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --python 3.11 --frozen --all-groups

      - name: Run unit tests
        run: uv run pytest -v -n 2 -m "not integration" tests/

      - name: Run integration tests
        run: uv run pytest -v -n 2 -m integration tests/integration/
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: unix:///var/run/docker.sock

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace dependencies
        run: bun run --filter @intric/ui build

      - name: Run type checks
        run: bun run check

      # The docs workflow owns docs-site lint/build; this gate stays focused on shipped frontend packages.
      - name: Run package lint
        run: FORCE_COLOR=1 bun run --filter '@intric/*' lint

      - name: Build frontend
        run: bun run build
        env:
          # The Svelte production build exceeds Node's default heap on GitHub-hosted runners.
          NODE_OPTIONS: --max-old-space-size=6144

  docker-builds:
    name: Docker builds (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: ./backend
            file: ./backend/Dockerfile
          - image: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
          - image: devcontainer
            context: ./.devcontainer
            file: ./.devcontainer/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build --pull --file "${{ matrix.file }}" --tag "eneo-${{ matrix.image }}:ci" "${{ matrix.context }}"

  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - branch-policy
      - backend-quality
      - backend-tests
      - frontend
      - docker-builds

    steps:
      - name: Check required jobs
        env:
          BRANCH_POLICY_RESULT: ${{ needs.branch-policy.result }}
          BACKEND_QUALITY_RESULT: ${{ needs.backend-quality.result }}
          BACKEND_TESTS_RESULT: ${{ needs.backend-tests.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          DOCKER_BUILDS_RESULT: ${{ needs.docker-builds.result }}
        run: |
          failed=0

          check_result() {
            local name="$1"
            local result="$2"

            case "$result" in
              success|skipped)
                echo "$name: $result"
                ;;
              *)
                echo "::error::$name failed with result: $result"
                failed=1
                ;;
            esac
          }

          check_result "Branch policy" "$BRANCH_POLICY_RESULT"
          check_result "Backend quality" "$BACKEND_QUALITY_RESULT"
          check_result "Backend tests" "$BACKEND_TESTS_RESULT"
          check_result "Frontend" "$FRONTEND_RESULT"
          check_result "Docker builds" "$DOCKER_BUILDS_RESULT"

          exit "$failed"
