name: CI

on:
  push:
    branches:
      - develop
      - 'release/**'
  pull_request:
    branches:
      - develop
      - 'release/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  POSTGRES_USER: placeholder
  POSTGRES_HOST: placeholder
  POSTGRES_PASSWORD: placeholder
  POSTGRES_PORT: 5432
  POSTGRES_DB: placeholder
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  UPLOAD_FILE_TO_SESSION_MAX_SIZE: 10485760
  UPLOAD_IMAGE_TO_SESSION_MAX_SIZE: 10485760
  UPLOAD_MAX_FILE_SIZE: 10485760
  TRANSCRIPTION_MAX_FILE_SIZE: 10485760
  MAX_IN_QUESTION: 1
  API_PREFIX: /api/v1
  API_KEY_LENGTH: 64
  API_KEY_HEADER_NAME: X-API-Key
  JWT_AUDIENCE: test
  JWT_ISSUER: test
  JWT_EXPIRY_TIME: 3600
  JWT_ALGORITHM: HS256
  JWT_SECRET: ci-test-jwt-secret-not-for-production-0123456789
  JWT_TOKEN_PREFIX: Bearer
  URL_SIGNING_KEY: test_key
  ENCRYPTION_KEY: yPIAaWTENh5knUuz75NYHblR3672X-7lH-W6AD4F1hs=
  OPENAI_API_KEY: test-api-key

jobs:
  branch-policy:
    if: github.event_name == 'pull_request'
    name: Branch policy
    runs-on: ubuntu-latest

    steps:
      - name: Check branch name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH_NAME" == "develop" || "$BRANCH_NAME" == release/* ]]; then
            echo "Long-lived branch; skipping naming convention check."
            exit 0
          fi

          VALID_PREFIXES="^(dependabot/|feature/|feat/|fix/|hotfix/|security/|chore/|deps/|docs/|test/|refactor/|remove/|ci/)"

          if [[ ! "$BRANCH_NAME" =~ $VALID_PREFIXES ]]; then
            echo "::error::Branch name '$BRANCH_NAME' does not follow the naming convention."
            echo "Use one of: dependabot/, feature/, feat/, fix/, hotfix/, security/, chore/, deps/, docs/, test/, refactor/, remove/, or ci/."
            exit 1
          fi

  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.8.22"
          enable-cache: true

      - name: Set up Python
        # uv downloads a prebuilt CPython from GitHub releases; that CDN
        # occasionally returns 504s. Retry with backoff so a transient
        # blip doesn't fail the whole run.
        run: |
          for attempt in 1 2 3 4 5; do
            if uv python install 3.11; then
              exit 0
            fi
            echo "::warning::uv python install failed (attempt $attempt/5); retrying in $((attempt * 10))s"
            sleep $((attempt * 10))
          done
          echo "::error::uv python install failed after 5 attempts"
          exit 1

      - name: Verify lockfile consistency
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --python 3.11 --frozen --all-groups

      - name: Ruff lint
        run: uv run ruff check src/intric --output-format github

      - name: Ruff format check
        run: uv run ruff format --check src/intric

      - name: Pyright type check
        run: uv run pyright

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.8.22"
          enable-cache: true

      - name: Set up Python
        # uv downloads a prebuilt CPython from GitHub releases; that CDN
        # occasionally returns 504s. Retry with backoff so a transient
        # blip doesn't fail the whole run.
        run: |
          for attempt in 1 2 3 4 5; do
            if uv python install 3.11; then
              exit 0
            fi
            echo "::warning::uv python install failed (attempt $attempt/5); retrying in $((attempt * 10))s"
            sleep $((attempt * 10))
          done
          echo "::error::uv python install failed after 5 attempts"
          exit 1

      - name: Verify lockfile consistency
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --python 3.11 --frozen --all-groups

      - name: Run unit tests
        run: uv run pytest -v -n 2 -m "not integration" --cov=src/intric --cov-report=term:skip-covered tests/

      - name: Run integration tests
        # --cov-append: add integration coverage on top of the unit run, then
        # emit the combined xml (for diff-cover) + html (human artifact).
        run: uv run pytest -v -n 2 -m integration --cov=src/intric --cov-append --cov-report=xml --cov-report=html --cov-report=term:skip-covered tests/integration/
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Upload backend coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov
          retention-days: 14
          if-no-files-found: warn

  script-tests:
    name: Script tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run developer-tooling tests
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enforced in pre-commit too, but pre-commit can be bypassed; CI is the
      # backstop that keeps the i18n catalogs duplicate-free and in key parity.
      - name: Check i18n message catalogs
        run: |
          python3 apps/web/scripts/check-i18n-duplicates.py
          python3 apps/web/scripts/check-i18n-parity.py

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace dependencies
        run: bun run --filter @intric/ui build

      - name: Run type checks
        run: bun run check

      # The docs workflow owns docs-site lint/build; this gate stays focused on shipped frontend packages.
      - name: Run package lint
        run: FORCE_COLOR=1 bun run --filter '@intric/*' lint

      - name: Run package tests
        run: FORCE_COLOR=1 bun run --filter '@intric/eslint-plugin' test

      # Component tests run in a real Chromium via Vitest browser mode, so the
      # matching Playwright browser must be on the runner. Pin the playwright
      # version explicitly: a bare `bun x playwright` fetches the latest and
      # installs a browser build that @vitest/browser (on the pinned playwright)
      # can't find. Keep this in sync with apps/web's playwright dependency.
      - name: Install Playwright Chromium
        run: bun x playwright@1.58.2 install --with-deps chromium chromium-headless-shell

      - name: Run web unit & component tests (with coverage)
        run: FORCE_COLOR=1 bun run --filter '@intric/web' test:coverage

      - name: Upload frontend coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/apps/web/coverage
          retention-days: 14
          if-no-files-found: warn

      - name: Build frontend
        run: bun run build
        env:
          # The Svelte production build exceeds Node's default heap on GitHub-hosted runners.
          NODE_OPTIONS: --max-old-space-size=6144

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Isolated, prod-safe stack: own postgres/redis, a deterministic mock model,
      # and the backend built from its Dockerfile. Nothing touches a real provider.
      - name: Start isolated E2E stack
        run: docker compose -f docker-compose.e2e.ci.yml up -d --build --wait

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build workspace dependencies
        working-directory: frontend
        run: bun run --filter @intric/ui build

      # Pin to match apps/web's @playwright/test dependency; a bare
      # `bun x playwright` fetches the latest and installs a browser build the
      # pinned runner can't find ("Executable doesn't exist").
      - name: Install Playwright Chromium
        working-directory: frontend/apps/web
        run: bun x playwright@1.58.2 install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend/apps/web
        env:
          # The workflow owns the stack lifecycle, so Playwright must not manage it.
          E2E_MANAGE_STACK: "0"
          E2E_BACKEND_URL: http://localhost:8124
          E2E_JWT_SECRET: ci-test-jwt-secret-not-for-production-0123456789 # matches the e2e-backend JWT_SECRET
        run: bun run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/apps/web/playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop E2E stack
        if: ${{ always() }}
        run: docker compose -f docker-compose.e2e.ci.yml down -v

  schema-drift:
    name: Schema drift
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.8.22"
          enable-cache: true

      - name: Set up Python
        # uv downloads a prebuilt CPython from GitHub releases; that CDN
        # occasionally returns 504s. Retry with backoff so a transient
        # blip doesn't fail the whole run.
        run: |
          for attempt in 1 2 3 4 5; do
            if uv python install 3.11; then
              exit 0
            fi
            echo "::warning::uv python install failed (attempt $attempt/5); retrying in $((attempt * 10))s"
            sleep $((attempt * 10))
          done
          echo "::error::uv python install failed after 5 attempts"
          exit 1
        working-directory: backend

      - name: Install backend dependencies
        run: uv sync --python 3.11 --frozen --all-groups
        working-directory: backend

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend

      # schema.d.ts is generated from the backend OpenAPI spec; nothing else keeps
      # it in sync, so a backend model change that skips regeneration silently
      # leaves the frontend types (and any ActionType-driven i18n guards) stale.
      - name: Dump backend OpenAPI spec
        run: uv run python -c "import json; from intric.server.main import app; json.dump(app.openapi(), open('/tmp/openapi.gen.json', 'w'))"
        working-directory: backend

      - name: Regenerate schema.d.ts
        run: |
          bun x openapi-typescript /tmp/openapi.gen.json -o src/types/schema.d.ts --default-non-nullable=false
          bun x prettier --write src/types/schema.d.ts
        working-directory: frontend/packages/intric-js

      - name: Fail on schema drift
        run: |
          SCHEMA=frontend/packages/intric-js/src/types/schema.d.ts
          if git diff --quiet -- "$SCHEMA"; then
            echo "$SCHEMA is in sync with the backend OpenAPI spec."
            exit 0
          fi

          echo "::error file=$SCHEMA::Out of sync with the backend OpenAPI spec — regenerate and commit it."

          # Render the drift in the job Summary so it's visible without opening raw logs.
          {
            echo "## ❌ schema.d.ts drift detected"
            echo ""
            echo "\`$SCHEMA\` does not match the backend OpenAPI spec."
            echo "Regenerate it (\`cd frontend/packages/intric-js && node update.js\` against a backend, or the offline \`app.openapi()\` regen) and commit the result."
            echo ""
            echo "<details><summary>Diff — committed (red) vs. regenerated/expected (green)</summary>"
            echo ""
            echo '```diff'
            git diff --no-color -- "$SCHEMA"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

          # Also surface it in the step log, collapsed.
          echo "::group::schema.d.ts diff (committed vs. regenerated)"
          git diff -- "$SCHEMA"
          echo "::endgroup::"
          exit 1

  # Reports how well the tests cover the lines THIS PR changed (patch coverage),
  # for frontend and backend separately. Report-only: never fails the PR and is
  # not part of the aggregate `CI` gate below. Posts/updates a sticky PR comment
  # and writes the same compact report to the job summary.
  coverage-diff:
    name: Coverage diff
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend-tests
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff-cover needs history back to the merge base

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: frontend-coverage
          path: frontend/apps/web/coverage

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: backend-coverage
          path: backend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install diff-cover
        run: pip install diff-cover

      - name: Compute diff coverage
        continue-on-error: true # report-only; never block the PR
        env:
          BASE: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE"

          # diff-cover matches the git diff (repo-root-relative paths) against each
          # coverage report. The reports use package-relative paths, so rewrite them
          # to repo-root-relative, then emit JSON for the comment step to render.
          if [ -f frontend/apps/web/coverage/lcov.info ]; then
            sed 's|^SF:|SF:frontend/apps/web/|' frontend/apps/web/coverage/lcov.info > fe.lcov
            diff-cover fe.lcov --compare-branch "origin/$BASE" --fail-under 0 --format json:fe.json || true
          fi

          if [ -f backend/coverage.xml ]; then
            sed -e 's|<source>.*</source>|<source>.</source>|' \
                -e 's|filename="|filename="backend/src/intric/|g' \
                backend/coverage.xml > be.xml
            diff-cover be.xml --compare-branch "origin/$BASE" --fail-under 0 --format json:be.json || true
          fi

      - name: Post or update PR comment
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- diff-coverage-report -->";

            const load = (p) => {
              try {
                return JSON.parse(fs.readFileSync(p, "utf8"));
              } catch {
                return null;
              }
            };
            // Show only the tail of long paths so the list stays readable.
            const shorten = (p) => {
              const s = p.split("/");
              return s.length > 3 ? "…/" + s.slice(-3).join("/") : p;
            };
            // Collapse a sorted line list into "12, 18–20" style ranges.
            const ranges = (nums) => {
              const sorted = [...new Set(nums)].sort((a, b) => a - b);
              const out = [];
              let start = null;
              let prev = null;
              for (const n of sorted) {
                if (start === null) start = prev = n;
                else if (n === prev + 1) prev = n;
                else {
                  out.push([start, prev]);
                  start = prev = n;
                }
              }
              if (start !== null) out.push([start, prev]);
              return out.map(([a, b]) => (a === b ? `${a}` : `${a}–${b}`)).join(", ");
            };

            // Drop areas with no changed lines so the comment only shows what's relevant.
            const areas = [
              ["Frontend", load("fe.json")],
              ["Backend", load("be.json")],
            ].filter(([, d]) => d && (d.total_num_lines || 0) > 0);

            const rows = [];
            const details = [];
            for (const [label, d] of areas) {
              const total = d.total_num_lines || 0;
              const miss = d.total_num_violations || 0;
              const pct = Math.round(d.total_percent_covered || 0);
              rows.push(`| ${label} | ${total} | ${miss} | ${pct}% |`);
              const files = Object.entries(d.src_stats || {})
                .map(([f, st]) => [f, st.violation_lines || []])
                .filter(([, vl]) => vl.length)
                .map(([f, vl]) => `- \`${shorten(f)}\` — ${ranges(vl)}`);
              if (files.length) details.push([label, files]);
            }

            let body = `${marker}\n## 📊 Patch coverage\n\nShare of this PR's new/changed lines exercised by tests. Report-only — never gates the PR.\n\n`;
            if (rows.length) {
              body += `| Area | Changed | Uncovered | Coverage |\n| --- | ---: | ---: | ---: |\n${rows.join("\n")}\n`;
            } else {
              body += "_No changed lines with coverage data in this PR._\n";
            }
            for (const [label, files] of details) {
              const n = files.length;
              body += `\n<details><summary>Uncovered lines — ${label} (${n} file${n === 1 ? "" : "s"})</summary>\n\n${files.join("\n")}\n\n</details>\n`;
            }

            fs.writeFileSync("diff-coverage.md", body);
            await core.summary.addRaw(body).write();

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload diff-coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: diff-coverage
          path: |
            diff-coverage.md
            fe.json
            be.json
          if-no-files-found: ignore

  docker-builds:
    name: Docker builds (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: ./backend
            file: ./backend/Dockerfile
          - image: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
          - image: devcontainer
            context: ./.devcontainer
            file: ./.devcontainer/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build --pull --file "${{ matrix.file }}" --tag "eneo-${{ matrix.image }}:ci" "${{ matrix.context }}"

  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - branch-policy
      - backend-quality
      - backend-tests
      - script-tests
      - frontend
      - schema-drift
      - docker-builds

    steps:
      - name: Check required jobs
        env:
          BRANCH_POLICY_RESULT: ${{ needs.branch-policy.result }}
          BACKEND_QUALITY_RESULT: ${{ needs.backend-quality.result }}
          BACKEND_TESTS_RESULT: ${{ needs.backend-tests.result }}
          SCRIPT_TESTS_RESULT: ${{ needs.script-tests.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          SCHEMA_DRIFT_RESULT: ${{ needs.schema-drift.result }}
          DOCKER_BUILDS_RESULT: ${{ needs.docker-builds.result }}
        run: |
          failed=0

          check_result() {
            local name="$1"
            local result="$2"

            case "$result" in
              success|skipped)
                echo "$name: $result"
                ;;
              *)
                echo "::error::$name failed with result: $result"
                failed=1
                ;;
            esac
          }

          check_result "Branch policy" "$BRANCH_POLICY_RESULT"
          check_result "Backend quality" "$BACKEND_QUALITY_RESULT"
          check_result "Backend tests" "$BACKEND_TESTS_RESULT"
          check_result "Script tests" "$SCRIPT_TESTS_RESULT"
          check_result "Frontend" "$FRONTEND_RESULT"
          check_result "Schema drift" "$SCHEMA_DRIFT_RESULT"
          check_result "Docker builds" "$DOCKER_BUILDS_RESULT"

          exit "$failed"
