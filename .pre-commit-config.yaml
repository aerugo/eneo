repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.3
    hooks:
      # Lint using project configuration (pyproject.toml)
      - id: ruff-check
        name: ruff
        args: [--fix]
        stages: [pre-commit]
        files: ^backend/
      # Format using project configuration (pyproject.toml)
      - id: ruff-format
        name: ruff-format
        stages: [pre-commit]
        files: ^backend/

  # Pyright type checking via devcontainer
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: docker exec -u vscode -i eneo_devcontainer-eneo-1 bash -i -c 'cd /workspace/backend && uv run pyright'
        language: system
        types: [python]
        files: ^backend/src/intric/
        pass_filenames: false
        stages: [pre-commit]

  # Keep uv.lock in sync with pyproject.toml
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.8.22
    hooks:
      - id: uv-lock
        args: [--directory, backend]

  # Prevent duplicate keys in i18n message files
  - repo: local
    hooks:
      - id: i18n-no-duplicate-keys
        name: i18n-no-duplicate-keys
        entry: python3 frontend/apps/web/scripts/check-i18n-duplicates.py
        language: system
        files: ^frontend/apps/web/messages/.*\.json$
        pass_filenames: false
